version: '3.8'

services:
  db:
    image: postgres:15
    container_name: crypto_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crypto_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: crypto_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: